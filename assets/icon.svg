<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Cadence cycling logo -->
  <!-- Arc with gap at 5 o'clock -->
  <path d="M 278 230 A 90 90 0 1 0 200 275" fill="none" stroke="#10B981" stroke-width="7" stroke-linecap="round"/>
  <!-- Crank arm -->
  <line x1="200" y1="185" x2="245" y2="263" stroke="#10B981" stroke-width="7" stroke-linecap="round"/>
  <!-- Pedal rect centered on crank tip -->
  <rect x="225" y="256" width="40" height="14" rx="4" fill="#10B981"/>
  <!-- Green circle hub -->
  <circle cx="200" cy="185" r="18" fill="#10B981"/>
  <!-- White knockout bolt -->
  <polygon points="200,168 192,187 199,187 195,202 208,183 201,183" fill="white"/>
</svg>
