<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Cadence cycling app logo -->
  <!-- Proportions: sqrt(2) / equal visual weight -->
  <!-- outer r=160, ring_outer=113.1, ring_inner=80 (scaled to fill canvas) -->
  <circle cx="200" cy="200" r="160" fill="#10B981"/>
  <circle cx="200" cy="200" r="113" fill="white"/>
  <circle cx="200" cy="200" r="80" fill="#10B981"/>
  <!-- White knockout bolt -->
  <polygon fill="white" points="200,147 179,203 197,203 188,253 221,197 203,197"/>
</svg>
